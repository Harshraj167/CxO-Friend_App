version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cxofriend-postgres
    environment:
      POSTGRES_USER: cxofriend_user
      POSTGRES_PASSWORD: cxofriend_password
      POSTGRES_DB: cxofriend_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: cxofriend-redis
    ports:
      - "6379:6379"
    restart: always

  # n8n will be added here later or configured further based on PRD
  n8n:
    image: n8nio/n8n
    container_name: cxofriend-n8n
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=cxofriend_db
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=cxofriend_user
      - DB_POSTGRESDB_PASSWORD=cxofriend_password
    depends_on:
      - db
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  n8n_data:
